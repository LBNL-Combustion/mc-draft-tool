services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: mc-draft-tool-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ../backend/app:/app
    networks:
      - app-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: mc-draft-tool-frontend
    ports:
      - "3000:80"
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: mc-draft-tool-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge